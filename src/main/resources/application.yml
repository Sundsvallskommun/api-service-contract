spring:
  application:
    name: api-contract
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      client:
        registration:
          billing-data-collector:
            authorization-grant-type: client_credentials
            provider: billing-data-collector

integration:
  billing-data-collector:
    connect-timeout: 5
    read-timeout: 15

dept44:
  models:
    api:
      paging:
        max:
          limit: 100

scheduler:
  contract-auto-extension:
    cron: "0 0 2 * * *"
    lock-at-most-for: "PT1H"
  contract-termination:
    cron: "0 0 1 * * *"
    lock-at-most-for: "PT1H"

openapi:
  name: ${spring.application.name}
  title: Contracts
  version: '@project.version@'
